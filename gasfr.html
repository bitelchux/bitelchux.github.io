<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Itinéraire + Stations-service</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
}
.app { display: flex; flex-direction: column; height: 100dvh; }

/* ── Panel ────────────────────────────────────────────── */
.panel {
    background: #fff;
    padding: 10px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
    z-index: 1000;
    display: flex; flex-direction: column; gap: 7px;
    flex-shrink: 0;
}
.row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }

.input-wrap {
    flex: 1; min-width: 140px;
    display: flex; align-items: center;
    border: 1.5px solid #ddd; border-radius: 8px;
    background: #fff; transition: border-color .2s;
    position: relative;
}
.input-wrap:focus-within { border-color: #1565C0; }
.input-wrap input {
    flex: 1; padding: 9px 10px; border: none;
    font-size: 14px; background: transparent; outline: none; min-width: 0;
}
.input-wrap input:disabled { color: #aaa; }

.suggestions {
    position: absolute; top: calc(100% + 3px); left: 0; right: 0;
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    z-index: 9999; overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,.15); display: none;
}
.suggestions.open { display: block; }
.sug-item {
    padding: 8px 12px; font-size: 12px; cursor: pointer;
    border-bottom: 1px solid #f0f0f0; line-height: 1.3; transition: background .12s;
}
.sug-item:last-child { border-bottom: none; }
.sug-item:hover, .sug-item.focused { background: #E3F2FD; color: #1565C0; }
.sug-main { font-weight: 600; color: #222; }
.sug-sub  { font-size: 10px; color: #888; margin-top: 1px; }

.btn-geo {
    padding: 6px 10px; border: none; background: transparent;
    color: #888; font-size: 18px; cursor: pointer; flex-shrink: 0;
}
.btn-geo:hover { color: #1565C0; }
.btn-geo.spin  { animation: giro 1s linear infinite; color: #1565C0; }
@keyframes giro { to { transform: rotate(360deg); } }

.btn {
    padding: 9px 14px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: background .2s; white-space: nowrap;
}
.btn-primary   { background: #1565C0; color: #fff; }
.btn-primary:hover   { background: #0D47A1; }
.btn-secondary { background: #607D8B; color: #fff; }
.btn-secondary:hover { background: #546E7A; }
.btn:disabled  { opacity: .5; cursor: not-allowed; }

/* Estado datos */
.db-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.db-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #bbb; flex-shrink: 0; transition: background .3s;
}
.db-dot.loading { background: #FFA726; animation: pulso 1s infinite; }
.db-dot.ok      { background: #43A047; }
.db-dot.error   { background: #E53935; }
@keyframes pulso { 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
.db-text { font-size: 12px; color: #555; }
.db-text strong { font-size: 13px; color: #222; }
.dl-bar {
    flex: 1; min-width: 40px; max-width: 180px; height: 3px;
    background: #E3F2FD; border-radius: 2px; overflow: hidden; display: none;
}
.dl-bar.on { display: block; }
.dl-inner { height: 100%; background: #1565C0; width: 0%; transition: width .2s; }

/* Filtros */
.filtros {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    font-size: 12px; color: #555;
}
.filtros label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.filtros input[type=range] { width: 80px; accent-color: #1565C0; }
.filtros select {
    padding: 4px 7px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 12px; cursor: pointer; background: #fff;
}

.msg { font-size: 12px; padding: 6px 10px; border-radius: 6px; display: none; }
.msg.on    { display: block; }
.msg.info  { background: #E3F2FD; color: #0D47A1; }
.msg.error { background: #FFEBEE; color: #B71C1C; }
.msg.ok    { background: #E8F5E9; color: #1B5E20; }

/* ── Layout ───────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }
#mapa { flex: 1; z-index: 1; }
.leaflet-routing-container { display: none !important; }

.sidebar {
    width: 300px; background: #fff;
    border-left: 1px solid #e0e0e0;
    display: flex; flex-direction: column; overflow: hidden;
    flex-shrink: 0; z-index: 2;
}
.sidebar-head {
    padding: 10px 12px; background: #1565C0; color: #fff;
    font-weight: 700; font-size: 13px;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; cursor: pointer; user-select: none;
}
.sidebar-head em { font-style: normal; font-size: 11px; opacity: .85; font-weight: 400; }
.sidebar-toggle { font-size: 12px; transition: transform .3s; }

.sidebar-sort {
    padding: 7px 10px; background: #f5f8ff;
    border-bottom: 1px solid #e0e0e0;
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: #444; flex-shrink: 0;
}
.sidebar-sort select {
    flex: 1; padding: 4px 6px; border: 1px solid #ddd;
    border-radius: 6px; font-size: 11px; cursor: pointer; background: #fff;
}

.gas-list { flex: 1; overflow-y: auto; padding: 5px; }
.gas-list::-webkit-scrollbar { width: 4px; }
.gas-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.gas-item {
    padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
    cursor: pointer; border: 1.5px solid transparent;
    transition: background .15s, border-color .15s;
    background: #fafafa; display: flex; gap: 8px; align-items: flex-start;
}
.gas-item:hover  { background: #E3F2FD; border-color: #90CAF9; }
.gas-item.active { background: #E3F2FD; border-color: #1565C0; }

.gas-rank {
    min-width: 22px; height: 22px; border-radius: 50%;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; color: #fff;
}
.gas-body { flex: 1; min-width: 0; }
.gas-nombre { font-weight: 700; font-size: 12px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gas-dir    { font-size: 10px; color: #777; margin: 1px 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gas-meta   { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }

.badge { font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
.b-lado-D  { background: #E8F5E9; color: #2E7D32; }
.b-lado-I  { background: #FCE4EC; color: #880E4F; }
.b-lado-A  { background: #E8EAF6; color: #283593; }
.b-km      { background: #F3E5F5; color: #6A1B9A; }
.b-dist    { background: #FBE9E7; color: #BF360C; }
.b-autoroute { background: #FFF3E0; color: #E65100; }
.b-route     { background: #E8F5E9; color: #1B5E20; }

.empty-msg { text-align: center; padding: 36px 16px; color: #bbb; font-size: 13px; line-height: 1.7; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 600px) {
    .main { flex-direction: column; }
    #mapa { flex: 1; min-height: 0; }
    .sidebar { width: 100%; height: 52dvh; border-left: none; border-top: 1px solid #e0e0e0; }
    .sidebar.collapsed .gas-list,
    .sidebar.collapsed .sidebar-sort { display: none; }
    .sidebar.collapsed { height: auto; }
    .sidebar.collapsed .sidebar-toggle { transform: rotate(180deg); }
    .panel { padding: 8px 10px; gap: 6px; }
    .filtros { gap: 6px; }
    .filtros input[type=range] { width: 65px; }
}
@media (min-width: 601px) and (max-width: 900px) {
    .sidebar { width: 260px; }
}
</style>
</head>
<body>
<div class="app">

<div class="panel">
    <div class="row">
        <div class="input-wrap">
            <input type="text" id="origen"  placeholder="Départ" autocomplete="off">
            <button class="btn-geo" id="btnGeo">&#x2316;</button>
            <div class="suggestions" id="sugOrigen"></div>
        </div>
        <div class="input-wrap">
            <input type="text" id="destino" placeholder="Arrivée" autocomplete="off">
            <div class="suggestions" id="sugDestino"></div>
        </div>
        <button class="btn btn-primary"   id="btnCalcular">Calculer</button>
        <button class="btn btn-secondary" id="btnSeguimiento">📍</button>
    </div>

    <div class="db-bar">
        <div class="db-dot" id="dbDot"></div>
        <div class="db-text">
            <strong id="dbLabel">Chargement des données…</strong>
            <span id="dbSub"></span>
        </div>
        <div class="dl-bar on" id="dlBar"><div class="dl-inner" id="dlInner"></div></div>
    </div>

    <div class="filtros">
        <label>
            <span id="umbralVal">150</span>m
            <input type="range" id="umbral" min="50" max="500" step="50" value="150">
        </label>
        <label>
            <select id="filtroLado">
                <option value="todos">Tous les côtés</option>
                <option value="D">Côté droit</option>
                <option value="I">Côté gauche</option>
            </select>
        </label>
        <label>
            <select id="filtroTipo">
                <option value="todos">Route + Autoroute</option>
                <option value="R">Route</option>
                <option value="A">Autoroute</option>
            </select>
        </label>
        <label>
            <select id="filtroComb">
                <option value="todos">Tous carburants</option>
                <option value="gazole">Gazole</option>
                <option value="sp95">SP95</option>
                <option value="sp98">SP98</option>
                <option value="e10">E10</option>
                <option value="e85">E85</option>
                <option value="gplc">GPLc</option>
            </select>
        </label>
    </div>

    <div class="msg" id="msg"></div>
</div>

<div class="main">
    <div id="mapa"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-head" id="sidebarHead">
            <span>⛽ Stations en route</span>
            <div style="display:flex;gap:10px;align-items:center">
                <em id="countLabel">—</em>
                <span class="sidebar-toggle">▲</span>
            </div>
        </div>
        <div class="sidebar-sort">
            Trier par :
            <select id="ordenar">
                <option value="precio_asc">Prix ↑ moins cher</option>
                <option value="precio_desc">Prix ↓ plus cher</option>
                <option value="km_asc">Ordre sur le trajet</option>
                <option value="dist_asc">Distance à la chaussée</option>
            </select>
        </div>
        <div class="gas-list" id="gasList">
            <div class="empty-msg">Calculez un itinéraire pour voir<br>les stations sur votre route ⛽</div>
        </div>
    </div>
</div>
</div>

<!-- Librerías al final del body -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
// ════════════════════════════════════════════════════════
//  CONFIGURACIÓN
// ════════════════════════════════════════════════════════
var CONFIG = {
    // API oficial del Ministerio de Economía francés — gratuita, sin API key
    // Actualizada cada 10 minutos, ~11 000 estaciones
    // Documentación: https://data.economie.gouv.fr/explore/dataset/prix-des-carburants-en-france-flux-instantane-v2/
    DATOS_URL: "https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/exports/csv?timezone=Europe%2FParis&use_labels=false&epsg=4326",

    DEBOUNCE_MS:     500,
    MAX_SUGERENCIAS: 5,
};

// ════════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ════════════════════════════════════════════════════════
var mapa, routingControl, marcadorUsuario, circuloPrecision, watchId;
var coordOrigen  = null;
var coordDestino = null;
var gasolinerasDB      = [];
var markersEnRuta      = [];
var routePolyline      = [];
var resultadosActuales = [];
var seguimientoActivo  = false;
var precioMin = Infinity, precioMax = -Infinity;

// ════════════════════════════════════════════════════════
//  INIT LEAFLET
// ════════════════════════════════════════════════════════
mapa = L.map("mapa", { zoomControl: true }).setView([46.6, 2.3], 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> | Données prix : <a href="https://www.prix-carburants.gouv.fr">Ministère de l\'Économie</a>',
    maxZoom: 19
}).addTo(mapa);

iniciarNominatim("origen",  "sugOrigen",  function(c){ coordOrigen  = c; });
iniciarNominatim("destino", "sugDestino", function(c){ coordDestino = c; });

document.getElementById("btnCalcular").addEventListener("click",    calcularRuta);
document.getElementById("btnSeguimiento").addEventListener("click", alternarSeguimiento);
document.getElementById("btnGeo").addEventListener("click",         usarMiUbicacion);

document.getElementById("umbral").addEventListener("input", function(){
    document.getElementById("umbralVal").textContent = this.value;
    if (routePolyline.length && gasolinerasDB.length) filtrarYMostrar();
});
["filtroLado","filtroTipo","filtroComb"].forEach(function(id){
    document.getElementById(id).addEventListener("change", function(){
        if (routePolyline.length && gasolinerasDB.length) {
            calcularRangoPrecio();
            filtrarYMostrar();
        }
    });
});
document.getElementById("ordenar").addEventListener("change", function(){
    if (resultadosActuales.length) mostrarResultados(ordenar(resultadosActuales.slice()));
});
document.getElementById("sidebarHead").addEventListener("click", function(){
    document.getElementById("sidebar").classList.toggle("collapsed");
});

cargarDatos();

// ════════════════════════════════════════════════════════
//  NOMINATIM — geocoding gratuito centrado en Francia
// ════════════════════════════════════════════════════════
function iniciarNominatim(inputId, sugId, cb) {
    var input  = document.getElementById(inputId);
    var sugBox = document.getElementById(sugId);
    var timer  = null, resultados = [], focusIdx = -1;

    function buscar() {
        var q = input.value.trim();
        if (q.length < 3) { cerrar(); return; }
        var url = "https://nominatim.openstreetmap.org/search?" + new URLSearchParams({
            q: q, format: "json", limit: CONFIG.MAX_SUGERENCIAS,
            countrycodes: "fr", addressdetails: 1, "accept-language": "fr"
        });
        fetch(url, { headers: { "Accept-Language": "fr" } })
            .then(function(r){ return r.json(); })
            .then(function(data) {
                if (!data.length) { cerrar(); return; }
                resultados = data; renderSugs();
            }).catch(function(){ cerrar(); });
    }

    function renderSugs() {
        sugBox.innerHTML = ""; focusIdx = -1;
        resultados.forEach(function(r, i) {
            var div = document.createElement("div");
            div.className = "sug-item";
            var main = r.name || r.display_name.split(",")[0];
            div.innerHTML = '<div class="sug-main">' + escH(main) + '</div>' +
                            '<div class="sug-sub">'  + escH(r.display_name) + '</div>';
            div.addEventListener("mousedown", function(e){ e.preventDefault(); seleccionar(i); });
            sugBox.appendChild(div);
        });
        sugBox.classList.add("open");
    }

    function seleccionar(i) {
        var r = resultados[i];
        input.value = r.display_name;
        cb({ lat: parseFloat(r.lat), lng: parseFloat(r.lon) });
        cerrar();
    }
    function cerrar() {
        sugBox.classList.remove("open"); sugBox.innerHTML = "";
        resultados = []; focusIdx = -1;
    }
    function actualizarFocus() {
        sugBox.querySelectorAll(".sug-item").forEach(function(el, i){
            el.classList.toggle("focused", i === focusIdx);
        });
    }

    input.addEventListener("input", function(){
        cb(null); clearTimeout(timer);
        timer = setTimeout(buscar, CONFIG.DEBOUNCE_MS);
    });
    input.addEventListener("keydown", function(e){
        if (e.key === "Enter") {
            e.preventDefault();
            if (focusIdx >= 0) { seleccionar(focusIdx); return; }
            clearTimeout(timer); buscar(); return;
        }
        if (e.key === "ArrowDown") { focusIdx = Math.min(focusIdx+1, resultados.length-1); actualizarFocus(); e.preventDefault(); return; }
        if (e.key === "ArrowUp")   { focusIdx = Math.max(focusIdx-1, -1); actualizarFocus(); e.preventDefault(); return; }
        if (e.key === "Escape")    { cerrar(); }
    });
    input.addEventListener("blur", function(){ setTimeout(cerrar, 150); });
}

function escH(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ════════════════════════════════════════════════════════
//  CARGA DATOS API OFICIAL FRANCESA
//  data.economie.gouv.fr — licencia abierta, sin API key
// ════════════════════════════════════════════════════════
function cargarDatos() {
    setDb("loading", "Téléchargement des données officielles…", "Ministère de l'Économie");

    fetch(CONFIG.DATOS_URL)
        .then(function(res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            var total = parseInt(res.headers.get("content-length") || "0");
            var loaded = 0, chunks = [];
            var reader = res.body.getReader();
            function leer() {
                return reader.read().then(function(r) {
                    if (r.done) return new Blob(chunks).text();
                    chunks.push(r.value); loaded += r.value.length;
                    if (total > 0)
                        document.getElementById("dlInner").style.width =
                            Math.min(100, Math.round(loaded/total*100)) + "%";
                    return leer();
                });
            }
            return leer();
        })
        .then(function(texto) {
            document.getElementById("dlInner").style.width = "100%";
            gasolinerasDB = parsearCSV(texto);
            var h = new Date().toLocaleTimeString("fr-FR",{ hour:"2-digit", minute:"2-digit" });
            setDb("ok", gasolinerasDB.length.toLocaleString("fr-FR") + " stations chargées", "Mis à jour " + h);
            document.getElementById("dlBar").classList.remove("on");
            if (routePolyline.length) filtrarYMostrar();
        })
        .catch(function(err) {
            setDb("error", "Erreur de chargement", err.message);
            document.getElementById("dlBar").classList.remove("on");
            console.error("[CSV]", err);
        });
}

function setDb(st, label, sub) {
    document.getElementById("dbDot").className    = "db-dot " + st;
    document.getElementById("dbLabel").textContent = label;
    document.getElementById("dbSub").textContent   = sub ? " · " + sub : "";
}

// ════════════════════════════════════════════════════════
//  PARSEO CSV DEL GOBIERNO FRANCÉS
//  Columnas clave del flux instantané v2:
//  id, cp, adresse, ville, latitude, longitude,
//  gazole_prix, sp95_prix, sp98_prix, e10_prix, e85_prix, gplc_prix,
//  services_service, horaires, pop (A=autoroute, R=route)
// ════════════════════════════════════════════════════════
function parsearCSV(texto) {
    var lineas = texto.split("\n");
    if (lineas.length < 2) return [];

    // Parsear cabecera CSV (separador ";")
    var cabecera = lineas[0].split(";").map(function(c){ return c.replace(/"/g,"").trim().toLowerCase(); });

    function ci(nombre) { return cabecera.indexOf(nombre); }

    var iLat   = ci("latitude");
    var iLng   = ci("longitude");
    var iNom   = ci("nom");          // nombre de la estación (marca)
    var iDir   = ci("adresse");
    var iVille = ci("ville");
    var iCP    = ci("cp");
    var iPop   = ci("pop");          // A=autoroute, R=route
    var iHor   = ci("horaires");

    // Precios — la API v2 los tiene como columnas separadas
    var iGaz  = ci("gazole_prix");
    var iSP95 = ci("sp95_prix");
    var iSP98 = ci("sp98_prix");
    var iE10  = ci("e10_prix");
    var iE85  = ci("e85_prix");
    var iGPL  = ci("gplc_prix");

    var resultado = [];

    for (var i = 1; i < lineas.length; i++) {
        var linea = lineas[i].trim();
        if (!linea) continue;

        // CSV con separador ; — manejo simple (sin comillas multilínea)
        var cols = linea.split(";").map(function(c){ return c.replace(/^"|"$/g,"").trim(); });

        var lat = parseFloat((cols[iLat]||"").replace(",","."));
        var lng = parseFloat((cols[iLng]||"").replace(",","."));

        // Francia: lat 41–51, lng -5–10
        if (isNaN(lat)||isNaN(lng)||lat<41||lat>52||lng<-6||lng>10) continue;

        var pop = iPop >= 0 ? (cols[iPop]||"R").toUpperCase().trim() : "R";
        if (!pop || pop === "") pop = "R";

        resultado.push({
            lat:    lat,
            lng:    lng,
            nombre: iNom  >= 0 ? (cols[iNom]||"Station").trim()  : "Station",
            dir:    iDir  >= 0 ? (cols[iDir]||"").trim()          : "",
            ville:  iVille>= 0 ? (cols[iVille]||"").trim()        : "",
            cp:     iCP   >= 0 ? (cols[iCP]||"").trim()           : "",
            pop:    pop,   // A=autoroute, R=route
            horario:iHor  >= 0 ? (cols[iHor]||"").trim()          : "",
            gazole: px(iGaz  >= 0 ? cols[iGaz]  : null),
            sp95:   px(iSP95 >= 0 ? cols[iSP95] : null),
            sp98:   px(iSP98 >= 0 ? cols[iSP98] : null),
            e10:    px(iE10  >= 0 ? cols[iE10]  : null),
            e85:    px(iE85  >= 0 ? cols[iE85]  : null),
            gplc:   px(iGPL  >= 0 ? cols[iGPL]  : null),
        });
    }
    return resultado;
}

function px(v) {
    if (v === null || v === undefined || v === "") return null;
    var n = parseFloat(String(v).replace(",","."));
    return isNaN(n) || n <= 0 ? null : n;
}

// ════════════════════════════════════════════════════════
//  CALCULAR RUTA — OSRM (gratuito)
// ════════════════════════════════════════════════════════
function calcularRuta() {
    if (!coordOrigen)  { msg("Sélectionnez le point de départ", "error"); return; }
    if (!coordDestino) { msg("Sélectionnez le point d'arrivée", "error"); return; }

    var btn = document.getElementById("btnCalcular");
    btn.disabled = true; btn.textContent = "…";
    msg("Calcul de l'itinéraire…", "info");

    if (routingControl) { mapa.removeControl(routingControl); routingControl = null; }

    routingControl = L.Routing.control({
        waypoints: [
            L.latLng(coordOrigen.lat,  coordOrigen.lng),
            L.latLng(coordDestino.lat, coordDestino.lng)
        ],
        routeWhileDragging: false, addWaypoints: false,
        draggableWaypoints: false, fitSelectedRoutes: true, show: false,
        lineOptions: { styles: [{ color: "#1565C0", weight: 5, opacity: 0.85 }] },
        router: L.Routing.osrmv1({
            serviceUrl: "https://router.project-osrm.org/route/v1",
            profile:    "driving"
        }),
        createMarker: function(i, wp) {
            return L.marker(wp.latLng, {
                icon: L.divIcon({
                    className: "",
                    html: svgLetra(i === 0 ? "#1565C0" : "#7B1FA2", i === 0 ? "A" : "B"),
                    iconSize: [28,36], iconAnchor: [14,36]
                })
            });
        }
    }).addTo(mapa);

    routingControl.on("routesfound", function(e) {
        btn.disabled = false; btn.textContent = "Calculer";
        var ruta = e.routes[0];
        var dist = (ruta.summary.totalDistance / 1000).toFixed(0) + " km";
        var dur  = Math.round(ruta.summary.totalTime / 60) + " min";
        msg("✓ " + dist + " · " + dur, "ok");

        routePolyline = ruta.coordinates.map(function(c){ return { lat: c.lat, lng: c.lng }; });
        calcularRangoPrecio();
        if (gasolinerasDB.length) filtrarYMostrar();
        else msg("✓ Itinéraire calculé. En attente des données stations…", "info");
    });

    routingControl.on("routingerror", function(e) {
        btn.disabled = false; btn.textContent = "Calculer";
        msg("Erreur de calcul : " + (e.error && e.error.message ? e.error.message : "vérifiez votre connexion"), "error");
    });
}

function svgLetra(color, letra) {
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 36" width="28" height="36">' +
        '<path fill="' + color + '" d="M14 0C6.27 0 0 6.27 0 14c0 5.25 3.02 9.8 7.44 12.12L14 36l6.56-10.88C24.98 23.8 28 19.25 28 14 28 6.27 21.73 0 14 0z"/>' +
        '<circle fill="white" cx="14" cy="14" r="8"/>' +
        '<text x="14" y="18" text-anchor="middle" font-size="9" font-family="Arial" font-weight="bold" fill="' + color + '">' + letra + '</text>' +
        '</svg>';
}

// ════════════════════════════════════════════════════════
//  GRADIENTE VERDE → AMARILLO → ROJO
// ════════════════════════════════════════════════════════
function calcularRangoPrecio() {
    var comb = document.getElementById("filtroComb").value;
    precioMin = Infinity; precioMax = -Infinity;
    gasolinerasDB.forEach(function(g) {
        var p = getPrecio(g, comb);
        if (p !== null) { if(p<precioMin) precioMin=p; if(p>precioMax) precioMax=p; }
    });
}

function precioAColor(p) {
    if (p === null || precioMin >= precioMax) return "#1565C0";
    var t = Math.max(0, Math.min(1, (p - precioMin) / (precioMax - precioMin)));
    var r, g, b;
    if (t < 0.5) {
        var tt = t * 2;
        r = Math.round(34  + tt * (234 - 34));
        g = Math.round(197 + tt * (179 - 197));
        b = Math.round(94  + tt * (8   - 94));
    } else {
        var tt = (t - 0.5) * 2;
        r = Math.round(234 + tt * (220 - 234));
        g = Math.round(179 + tt * (38  - 179));
        b = Math.round(8   + tt * (38  - 8));
    }
    return "rgb(" + r + "," + g + "," + b + ")";
}

function getPrecio(gas, comb) {
    if (comb === "todos") {
        var ps = [gas.gazole, gas.sp95, gas.sp98, gas.e10, gas.e85, gas.gplc].filter(function(p){ return p !== null; });
        return ps.length ? Math.min.apply(null, ps) : null;
    }
    return gas[comb] !== undefined ? gas[comb] : null;
}

function precioOrden(gas) {
    var p = getPrecio(gas, document.getElementById("filtroComb").value);
    return p !== null ? p : Infinity;
}

// ════════════════════════════════════════════════════════
//  GEOMETRÍA
// ════════════════════════════════════════════════════════
function haversine(a, b) {
    var R=6371000, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
    var h = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    return 2*R*Math.asin(Math.sqrt(h));
}

function proyectar(P, A, B) {
    var cosL = Math.cos(A.lat*Math.PI/180);
    var bx=(B.lng-A.lng)*cosL*111320, by=(B.lat-A.lat)*111320;
    var px=(P.lng-A.lng)*cosL*111320, py=(P.lat-A.lat)*111320;
    var ab2=bx*bx+by*by, t=ab2>0?Math.max(0,Math.min(1,(px*bx+py*by)/ab2)):0;
    var dx=px-t*bx, dy=py-t*by;
    return { dist:Math.sqrt(dx*dx+dy*dy), t:t, lado:bx*py-by*px>0?"I":"D" };
}

function gasVsRuta(gas, poly) {
    var minD=Infinity, minL="D", minI=0, minT=0;
    for (var i=0; i<poly.length-1; i++) {
        var r=proyectar(gas, poly[i], poly[i+1]);
        if(r.dist<minD){minD=r.dist;minL=r.lado;minI=i;minT=r.t;}
    }
    var km=0;
    for(var j=0;j<minI;j++) km+=haversine(poly[j],poly[j+1]);
    km+=minT*haversine(poly[minI],poly[minI+1]);
    return { distM:Math.round(minD), lado:minL, km:km/1000 };
}

// ════════════════════════════════════════════════════════
//  FILTRAR → ORDENAR → MOSTRAR
// ════════════════════════════════════════════════════════
function ordenar(lista) {
    var cr = document.getElementById("ordenar").value;
    lista.sort(function(a,b){
        switch(cr){
            case "precio_asc":  return precioOrden(a.gas)-precioOrden(b.gas);
            case "precio_desc": return precioOrden(b.gas)-precioOrden(a.gas);
            case "km_asc":      return a.km-b.km;
            case "dist_asc":    return a.distM-b.distM;
            default: return 0;
        }
    });
    return lista;
}

function filtrarYMostrar() {
    var umbral = parseInt(document.getElementById("umbral").value);
    var flado  = document.getElementById("filtroLado").value;
    var ftipo  = document.getElementById("filtroTipo").value;
    var comb   = document.getElementById("filtroComb").value;

    var enc = gasolinerasDB.reduce(function(acc, gas) {
        var r = gasVsRuta(gas, routePolyline);
        if (r.distM > umbral) return acc;

        // Filtro lado (geométrico)
        if (flado !== "todos" && r.lado !== flado) return acc;

        // Filtro autoroute / route
        if (ftipo !== "todos" && gas.pop !== ftipo) return acc;

        // Filtro combustible
        if (comb !== "todos" && !gas[comb]) return acc;

        acc.push({ gas:gas, distM:r.distM, lado:r.lado, km:r.km });
        return acc;
    }, []);

    resultadosActuales = enc;
    mostrarResultados(ordenar(enc.slice()));
}

// ════════════════════════════════════════════════════════
//  ICONO PIN CON GRADIENTE
// ════════════════════════════════════════════════════════
function iconoGasolinera(color, pStr) {
    var svg =
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 44" width="34" height="44">' +
        '<path fill="' + color + '" stroke="rgba(0,0,0,.2)" stroke-width="1" ' +
              'd="M17 0C7.61 0 0 7.61 0 17c0 6.56 3.7 12.27 9.15 15.24L17 44l7.85-11.76C30.3 29.27 34 23.56 34 17 34 7.61 26.39 0 17 0z"/>' +
        '<circle fill="white" cx="17" cy="17" r="11"/>' +
        '<text x="17" y="14" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="' + color + '" font-weight="bold">⛽</text>' +
        (pStr ? '<text x="17" y="22" text-anchor="middle" font-size="6.5" font-family="Arial,sans-serif" fill="' + color + '" font-weight="bold">' + pStr + '</text>' : '') +
        '</svg>';
    return L.divIcon({
        className: "", html: svg,
        iconSize: [34,44], iconAnchor: [17,44], popupAnchor: [0,-44]
    });
}

// ════════════════════════════════════════════════════════
//  PINTAR RESULTADOS
// ════════════════════════════════════════════════════════
function mostrarResultados(lista) {
    markersEnRuta.forEach(function(m){ mapa.removeLayer(m); });
    markersEnRuta = [];

    document.getElementById("countLabel").textContent =
        lista.length + " station" + (lista.length !== 1 ? "s" : "");

    var container = document.getElementById("gasList");
    container.innerHTML = "";

    if (!lista.length) {
        container.innerHTML = '<div class="empty-msg">Aucune station dans ce rayon.<br>Augmentez les mètres ☝️</div>';
        return;
    }

    var comb = document.getElementById("filtroComb").value;

    lista.forEach(function(item, idx) {
        var gas   = item.gas;
        var p     = getPrecio(gas, comb);
        var color = precioAColor(p);
        var pStr  = p !== null ? p.toFixed(3) : null;

        // Marcador Leaflet
        var marker = L.marker([gas.lat, gas.lng], {
            icon: iconoGasolinera(color, pStr ? p.toFixed(2) : null),
            title: gas.nombre, zIndexOffset: 500 - idx
        }).addTo(mapa);

        // Popup con todos los precios disponibles
        var combsPrix = [
            ["Gazole", gas.gazole], ["SP95",  gas.sp95],
            ["SP98",  gas.sp98],  ["E10",   gas.e10],
            ["E85",   gas.e85],   ["GPLc",  gas.gplc]
        ];
        var tabla = combsPrix.filter(function(f){ return f[1]; }).map(function(f){
            var c = precioAColor(f[1]);
            return '<tr><td style="color:#555;padding-right:12px">' + f[0] + '</td>' +
                   '<td style="font-weight:700;text-align:right;color:'+c+'">' + f[1].toFixed(3) + ' €/L</td></tr>';
        }).join("");

        var popupContent =
            '<div style="min-width:180px;font-family:sans-serif;font-size:13px">' +
            '<strong style="font-size:14px">' + escH(gas.nombre) + '</strong>' +
            (gas.pop === "A" ? ' <span style="font-size:10px;background:#FFF3E0;color:#E65100;padding:1px 5px;border-radius:4px;font-weight:700">🛣 Autoroute</span>' : '') +
            '<br><span style="color:#666;font-size:11px">' + escH(gas.dir) + (gas.ville ? " · " + escH(gas.ville) : "") + (gas.cp ? " " + escH(gas.cp) : "") + '</span>' +
            '<hr style="margin:6px 0;border:none;border-top:1px solid #eee">' +
            (tabla ? '<table style="border-collapse:collapse;width:100%;font-size:12px">' + tabla + '</table>' : '<em style="color:#aaa;font-size:12px">Prix non disponibles</em>') +
            '<hr style="margin:6px 0;border:none;border-top:1px solid #eee">' +
            '<span style="font-size:11px;color:#555">📍 Côté ' + (item.lado==="D"?"droit":"gauche") +
                ' · km ' + item.km.toFixed(1) + ' · ' + item.distM + ' m</span>' +
            (gas.horario ? '<br><span style="font-size:10px;color:#999">🕐 ' + escH(gas.horario.substring(0,80)) + '</span>' : '') +
            '<br><br><a href="https://www.google.com/maps/dir/?api=1&destination=' + gas.lat + ',' + gas.lng + '" ' +
                'target="_blank" style="color:#1565C0;font-size:12px">🗺 Itinéraire</a>' +
            '</div>';

        marker.bindPopup(popupContent, { maxWidth: 260 });
        marker.on("click", function(){ resaltarItem(idx); });

        markersEnRuta.push(marker);
        gas._marker = marker;

        // Item lista
        var ladoLabel = item.lado === "D" ? "🟢 Droite" : "🔴 Gauche";
        var ladoClass = "b-lado-" + (item.lado || "A");
        var tipoBadge = gas.pop === "A"
            ? '<span class="badge b-autoroute">🛣 Autoroute</span>'
            : '<span class="badge b-route">🛤 Route</span>';

        var precioBadge = "";
        if (p !== null) {
            var bg = color.replace("rgb(","rgba(").replace(")",", 0.12)");
            var bo = color.replace("rgb(","rgba(").replace(")",", 0.4)");
            precioBadge = '<span class="badge" style="background:'+bg+';color:'+color+';border:1px solid '+bo+';font-size:11px">' +
                          p.toFixed(3) + ' €</span>';
        }

        var div = document.createElement("div");
        div.className = "gas-item"; div.id = "item-" + idx;
        div.innerHTML =
            '<div class="gas-rank" style="background:' + color + '">' + (idx+1) + '</div>' +
            '<div class="gas-body">' +
                '<div class="gas-nombre">' + escH(gas.nombre) + '</div>' +
                '<div class="gas-dir">' + escH(gas.dir) + (gas.ville?" · "+escH(gas.ville):"") + '</div>' +
                '<div class="gas-meta">' +
                    precioBadge +
                    '<span class="badge ' + ladoClass + '">' + ladoLabel + '</span>' +
                    tipoBadge +
                    '<span class="badge b-km">km ' + item.km.toFixed(1) + '</span>' +
                    '<span class="badge b-dist">' + item.distM + 'm</span>' +
                '</div>' +
            '</div>';

        div.addEventListener("click", function(){
            resaltarItem(idx);
            mapa.setView([gas.lat, gas.lng], 16);
            gas._marker.openPopup();
            if (window.innerWidth <= 600) document.getElementById("sidebar").classList.add("collapsed");
        });

        container.appendChild(div);
    });
}

function resaltarItem(idx) {
    document.querySelectorAll(".gas-item").forEach(function(el){ el.classList.remove("active"); });
    var el = document.getElementById("item-" + idx);
    if (el) { el.classList.add("active"); el.scrollIntoView({ behavior:"smooth", block:"nearest" }); }
}

// ════════════════════════════════════════════════════════
//  GEOLOCALIZACIÓN
// ════════════════════════════════════════════════════════
function usarMiUbicacion() {
    if (!navigator.geolocation) { msg("Géolocalisation non disponible","error"); return; }
    var btn=document.getElementById("btnGeo"), inp=document.getElementById("origen");
    btn.classList.add("spin"); btn.textContent="↻";
    inp.value="Localisation en cours…"; inp.disabled=true;

    navigator.geolocation.getCurrentPosition(
        function(pos) {
            var lat=pos.coords.latitude, lng=pos.coords.longitude;
            coordOrigen = { lat:lat, lng:lng };
            fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&accept-language=fr")
                .then(function(r){ return r.json(); })
                .then(function(d){
                    btn.classList.remove("spin"); btn.textContent="⊕"; inp.disabled=false;
                    inp.value = d.display_name || lat.toFixed(5)+", "+lng.toFixed(5);
                    msg("Précision GPS : ±" + Math.round(pos.coords.accuracy) + " m", "info");
                })
                .catch(function(){
                    btn.classList.remove("spin"); btn.textContent="⊕"; inp.disabled=false;
                    inp.value = lat.toFixed(5)+", "+lng.toFixed(5);
                });
        },
        function(err) {
            btn.classList.remove("spin"); btn.textContent="⊕";
            inp.disabled=false; inp.value=""; coordOrigen=null;
            msg({1:"Permission refusée",2:"Signal GPS absent",3:"Délai dépassé"}[err.code]||err.message,"error");
        },
        { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
}

function alternarSeguimiento() {
    var btn = document.getElementById("btnSeguimiento");
    if (!seguimientoActivo) {
        iniciarSeguimiento(); btn.textContent="⏹"; seguimientoActivo=true;
    } else {
        detenerSeguimiento(); btn.textContent="📍"; seguimientoActivo=false;
    }
}

function iniciarSeguimiento() {
    if (!navigator.geolocation) { msg("Géolocalisation non disponible","error"); return; }
    watchId = navigator.geolocation.watchPosition(
        function(pos) {
            var loc=L.latLng(pos.coords.latitude, pos.coords.longitude), prec=pos.coords.accuracy;
            if (!marcadorUsuario) {
                var icon = L.divIcon({
                    className:"",
                    html:'<div style="width:16px;height:16px;border-radius:50%;background:#4285F4;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.3)"></div>',
                    iconSize:[16,16], iconAnchor:[8,8]
                });
                marcadorUsuario  = L.marker(loc, { icon:icon, zIndexOffset:999 }).addTo(mapa);
                circuloPrecision = L.circle(loc, { radius:prec, color:"#4285F4", weight:1, fillOpacity:.12 }).addTo(mapa);
                mapa.setView(loc, 15);
            } else {
                marcadorUsuario.setLatLng(loc);
                circuloPrecision.setLatLng(loc); circuloPrecision.setRadius(prec);
            }
            msg("📍 ±" + Math.round(prec) + " m", "info");
        },
        function(err) {
            msg("Erreur GPS : " + err.message, "error");
            detenerSeguimiento();
            document.getElementById("btnSeguimiento").textContent="📍";
            seguimientoActivo=false;
        },
        { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
}

function detenerSeguimiento() {
    if (watchId!=null)        { navigator.geolocation.clearWatch(watchId); watchId=null; }
    if (marcadorUsuario)      { mapa.removeLayer(marcadorUsuario);  marcadorUsuario=null; }
    if (circuloPrecision)     { mapa.removeLayer(circuloPrecision); circuloPrecision=null; }
}

function msg(txt, tipo) {
    var el=document.getElementById("msg");
    el.innerHTML=txt; el.className="msg on "+tipo;
}

window.addEventListener("beforeunload", detenerSeguimiento);
</script>
