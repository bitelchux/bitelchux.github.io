<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ruta + Gasolineras</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<!-- Leaflet Routing Machine CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">

<style>
/* ─── Reset ─────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
}

/* ─── Raíz ──────────────────────────────────────────── */
.app {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
}

/* ─── Panel de controles ─────────────────────────────── */
.panel {
    background: #fff;
    padding: 10px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex-shrink: 0;
}

.row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }

/* Inputs */
.input-wrap {
    flex: 1; min-width: 140px;
    display: flex; align-items: center;
    border: 1.5px solid #ddd; border-radius: 8px;
    background: #fff; transition: border-color .2s;
    position: relative;
}
.input-wrap:focus-within { border-color: #1976D2; }
.input-wrap input {
    flex: 1; padding: 9px 10px;
    border: none; font-size: 14px;
    background: transparent; outline: none; min-width: 0;
}
.input-wrap input:disabled { color: #aaa; }

/* Sugerencias Nominatim */
.suggestions {
    position: absolute; top: calc(100% + 3px); left: 0; right: 0;
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    z-index: 9999; overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,.15); display: none;
}
.suggestions.open { display: block; }
.sug-item {
    padding: 9px 12px; font-size: 12px; cursor: pointer;
    border-bottom: 1px solid #f0f0f0; line-height: 1.3;
    transition: background .12s;
}
.sug-item:last-child { border-bottom: none; }
.sug-item:hover, .sug-item.focused { background: #E3F2FD; color: #1565C0; }
.sug-item .sug-main { font-weight: 600; color: #222; }
.sug-item .sug-sub  { font-size: 10px; color: #888; margin-top: 1px; }

/* Botón geolocalización */
.btn-geo {
    padding: 6px 10px; border: none; background: transparent;
    color: #888; font-size: 18px; cursor: pointer; flex-shrink: 0;
}
.btn-geo:hover { color: #1976D2; }
.btn-geo.spin  { animation: giro 1s linear infinite; color: #1976D2; }
@keyframes giro { to { transform: rotate(360deg); } }

/* Botones */
.btn {
    padding: 9px 14px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: background .2s; white-space: nowrap;
}
.btn:disabled  { opacity: .5; cursor: not-allowed; }
.btn-primary   { background: #1976D2; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #1565C0; }
.btn-secondary { background: #607D8B; color: #fff; }
.btn-secondary:hover { background: #546E7A; }

/* Estado descarga datos */
.db-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.db-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #bbb; flex-shrink: 0; transition: background .3s;
}
.db-dot.loading { background: #FFA726; animation: pulso 1s infinite; }
.db-dot.ok      { background: #43A047; }
.db-dot.error   { background: #E53935; }
@keyframes pulso { 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
.db-text { font-size: 12px; color: #555; }
.db-text strong { font-size: 13px; color: #222; }
.dl-bar {
    flex: 1; min-width: 40px; max-width: 180px; height: 3px;
    background: #E3F2FD; border-radius: 2px; overflow: hidden; display: none;
}
.dl-bar.on { display: block; }
.dl-inner { height: 100%; background: #1976D2; width: 0%; transition: width .2s; }

/* Filtros */
.filtros {
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap; font-size: 12px; color: #555;
}
.filtros label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.filtros input[type=range] { width: 80px; accent-color: #1976D2; }
.filtros select {
    padding: 4px 7px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 12px; cursor: pointer; background: #fff;
}

/* Mensaje estado ruta */
.msg { font-size: 12px; padding: 6px 10px; border-radius: 6px; display: none; }
.msg.on    { display: block; }
.msg.info  { background: #E3F2FD; color: #0D47A1; }
.msg.error { background: #FFEBEE; color: #B71C1C; }
.msg.ok    { background: #E8F5E9; color: #1B5E20; }

/* ─── Mapa ───────────────────────────────────────────── */
.main {
    height: 55vh;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    transition: height .4s ease;
}
.main.oculto { height: 0; }
#mapa { width: 100%; height: 100%; z-index: 1; }
.leaflet-routing-container { display: none !important; }

/* ─── Pestañas toggle (móvil) ────────────────────────── */
.tab-toggle {
    display: none;          /* oculto en desktop */
    width: 100%;
    padding: 6px 12px;
    border: none;
    font-size: 12px; font-weight: 700;
    cursor: pointer; text-align: center;
    letter-spacing: .3px;
    flex-shrink: 0;
}
.tab-panel { background: #1565C0; color: #fff; }
.tab-panel:hover { background: #0D47A1; }
.tab-mapa  { background: #37474F; color: #fff; }
.tab-mapa:hover  { background: #263238; }

/* ─── Listado de gasolineras (debajo del mapa) ───────── */
.listado {
    background: #fff;
    border-top: 1px solid #e0e0e0;
    display: none;
}
.listado.visible { display: block; }

.listado-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #1976D2;
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    gap: 8px;
    position: sticky;   /* cabecera pegajosa al hacer scroll */
    top: 0;
    z-index: 10;
}
.listado-head-izq  { display: flex; align-items: center; gap: 8px; }
.listado-head-count { font-size: 11px; font-weight: 400; opacity: .85; }

/* Botón colapsar lista — solo móvil */
.btn-toggle-lista {
    display: none;
    align-items: center; gap: 5px;
    background: rgba(255,255,255,.2);
    border: 1px solid rgba(255,255,255,.35);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px; font-weight: 700;
    color: #fff; cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
}
.btn-toggle-lista:hover { background: rgba(255,255,255,.3); }
.btn-toggle-lista .flecha { font-size: 10px; transition: transform .3s; }
.listado.colapsado .flecha { transform: rotate(180deg); }

/* Ordenación */
.listado-orden {
    padding: 7px 10px; background: #f5f8ff;
    border-bottom: 1px solid #e0e0e0;
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: #444;
}
.listado-orden select {
    flex: 1; padding: 4px 6px; border: 1px solid #ddd;
    border-radius: 6px; font-size: 11px; cursor: pointer; background: #fff;
}

/* Cuerpo del listado — se oculta al colapsar */
.listado.colapsado .listado-cuerpo { display: none; }

/* Gas-list: bloque normal, scroll de la página */
.gas-list { padding: 5px; }

/* Tarjetas */
.gas-item {
    padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
    cursor: pointer; border: 1.5px solid transparent;
    transition: background .15s, border-color .15s;
    background: #fafafa; display: flex; gap: 8px; align-items: flex-start;
}
.gas-item:hover  { background: #E3F2FD; border-color: #90CAF9; }
.gas-item.active { background: #E3F2FD; border-color: #1976D2; }

.gas-rank {
    min-width: 22px; height: 22px; border-radius: 50%;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; color: #fff;
}
.gas-body { flex: 1; min-width: 0; }
.gas-nombre { font-weight: 700; font-size: 12px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gas-dir    { font-size: 10px; color: #777; margin: 1px 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gas-meta   { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }

.badge { font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
.b-lado-D { background: #E8F5E9; color: #2E7D32; }
.b-lado-I { background: #FCE4EC; color: #880E4F; }
.b-lado-A { background: #E8EAF6; color: #283593; }
.b-km     { background: #F3E5F5; color: #6A1B9A; }
.b-dist   { background: #FBE9E7; color: #BF360C; }

.empty-msg { text-align: center; padding: 36px 16px; color: #bbb; font-size: 13px; line-height: 1.7; }

/* ─── MÓVIL ──────────────────────────────────────────── */
@media (max-width: 600px) {

    /* Panel de búsqueda: animación de colapso */
    .panel {
        overflow: hidden;
        max-height: 300px;
        transition: max-height .4s ease, padding .4s ease, gap .4s ease;
        padding: 8px 10px; gap: 6px;
    }
    .panel.colapsado {
        max-height: 0;
        padding-top: 0; padding-bottom: 0; gap: 0;
    }
    .filtros { gap: 6px; }
    .filtros input[type=range] { width: 65px; }

    /* Pestañas toggle visibles en móvil */
    .tab-toggle { display: block; }

    /* Botón colapsar lista visible en móvil */
    .btn-toggle-lista { display: flex; }

    /* Mapa más compacto en móvil */
    .main { height: 40vh; }
}
</style>
</head>
<body>
<div class="app">

    <!-- ── PANEL DE CONTROLES ─────────────────────────── -->
    <div class="panel" id="panel">
        <div class="row">
            <div class="input-wrap">
                <input type="text" id="origen"  placeholder="Origen"  autocomplete="off">
                <button class="btn-geo" id="btnGeo" title="Usar mi ubicación">&#x2316;</button>
                <div class="suggestions" id="sugOrigen"></div>
            </div>
            <div class="input-wrap">
                <input type="text" id="destino" placeholder="Destino" autocomplete="off">
                <div class="suggestions" id="sugDestino"></div>
            </div>
            <button class="btn btn-primary"   id="btnCalcular">Calcular ruta</button>
            <button class="btn btn-secondary" id="btnSeguimiento" title="Seguimiento GPS">📍</button>
        </div>

        <div class="db-bar">
            <div class="db-dot" id="dbDot"></div>
            <div class="db-text">
                <strong id="dbLabel">Cargando datos…</strong>
                <span id="dbSub"></span>
            </div>
            <div class="dl-bar on" id="dlBar"><div class="dl-inner" id="dlInner"></div></div>
        </div>

        <div class="filtros">
            <label>
                <span id="umbralVal">5</span>km
                <input type="range" id="umbral" min="1" max="100" step="1" value="5">
            </label>
            <label>
                <select id="filtroLado">
                    <option value="D">Solo derecho</option>
                    <option value="I">Solo izquierdo</option>
                    <option value="A">Ambos lados</option>
                    <option value="todos">Uno u otro</option>
                </select>
            </label>
            <label>
                <select id="filtroComb">
                    <option value="todos">Todos combustibles</option>
                    <option value="g95">Gasolina 95</option>
                    <option value="g98">Gasolina 98</option>
                    <option value="goa">Gasóleo A</option>
                    <option value="glp">GLP</option>
                </select>
            </label>
        </div>

        <div class="msg" id="msg"></div>
    </div>

    <!-- Pestaña ocultar/mostrar búsqueda (solo móvil) -->
    <button class="tab-toggle tab-panel" id="btnTogglePanel">▲ Ocultar búsqueda</button>

    <!-- ── MAPA ──────────────────────────────────────── -->
    <div class="main" id="main">
        <div id="mapa"></div>
    </div>

    <!-- Pestaña ocultar/mostrar mapa (solo móvil) -->
    <button class="tab-toggle tab-mapa" id="btnToggleMapa">▲ Ocultar mapa</button>

    <!-- ── LISTADO DE GASOLINERAS ──────────────────────── -->
    <div class="listado" id="listado">

        <div class="listado-head">
            <div class="listado-head-izq">
                <span>⛽ Gasolineras en ruta</span>
                <span class="listado-head-count" id="countLabel"></span>
            </div>
            <button class="btn-toggle-lista" id="btnToggleLista">
                <span id="toggleTexto">Ocultar lista</span>
                <span class="flecha">▼</span>
            </button>
        </div>

        <div class="listado-cuerpo">
            <div class="listado-orden">
                Ordenar por:
                <select id="ordenar">
                    <option value="precio_asc">Precio ↑ más barato</option>
                    <option value="precio_desc">Precio ↓ más caro</option>
                    <option value="km_asc">Orden en ruta</option>
                    <option value="dist_asc">Distancia a calzada</option>
                </select>
            </div>
            <div class="gas-list" id="gasList"></div>
        </div>

    </div>

</div>

mapa = L.map("mapa", { zoomControl: true }).setView([40.4168, -3.7038], 7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
}).addTo(mapa);

// Buscadores
iniciarNominatim("origen",  "sugOrigen",  function(c){ coordOrigen  = c; });
iniciarNominatim("destino", "sugDestino", function(c){ coordDestino = c; });

// Botones de acción
document.getElementById("btnCalcular").addEventListener("click",    calcularRuta);
document.getElementById("btnSeguimiento").addEventListener("click", alternarSeguimiento);
document.getElementById("btnGeo").addEventListener("click",         usarMiUbicacion);

// Slider → solo actualiza el texto, no relanza la búsqueda
document.getElementById("umbral").addEventListener("input", function(){
    document.getElementById("umbralVal").textContent = this.value;
});

// Reordenar la lista ya mostrada (sin recalcular)
document.getElementById("ordenar").addEventListener("change", function(){
    if (resultadosActuales.length) mostrarResultados(ordenar(resultadosActuales.slice()));
});

// Pestañas toggle (móvil)
document.getElementById("btnTogglePanel").addEventListener("click", function(){ togglePanel(); });
document.getElementById("btnToggleMapa").addEventListener("click",  function(){ toggleMapa(); });
document.getElementById("btnToggleLista").addEventListener("click", function(){ toggleLista(); });

// Arrancar carga del CSV
cargarCSV();


// ════════════════════════════════════════════════════════
//  TOGGLES DE SECCIONES (solo actúan en móvil)
// ════════════════════════════════════════════════════════
function togglePanel() {
    if (window.innerWidth > 600) return;
    var panel = document.getElementById("panel");
    var btn   = document.getElementById("btnTogglePanel");
    var cerrado = panel.classList.toggle("colapsado");
    btn.textContent = cerrado ? "▼ Mostrar búsqueda" : "▲ Ocultar búsqueda";
    setTimeout(function(){ mapa.invalidateSize(); }, 420);
}

function colapsarPanel() {
    if (window.innerWidth > 600) return;
    var panel = document.getElementById("panel");
    var btn   = document.getElementById("btnTogglePanel");
    if (!panel.classList.contains("colapsado")) {
        panel.classList.add("colapsado");
        btn.textContent = "▼ Mostrar búsqueda";
        setTimeout(function(){ mapa.invalidateSize(); }, 420);
    }
}

function toggleMapa() {
    if (window.innerWidth > 600) return;
    var mainEl = document.getElementById("main");
    var btn    = document.getElementById("btnToggleMapa");
    var oculto = mainEl.classList.toggle("oculto");
    btn.textContent = oculto ? "▼ Mostrar mapa" : "▲ Ocultar mapa";
    setTimeout(function(){ mapa.invalidateSize(); }, 420);
}

function toggleLista() {
    var listado = document.getElementById("listado");
    var colapsado = listado.classList.toggle("colapsado");
    document.getElementById("toggleTexto").textContent = colapsado ? "Ver lista" : "Ocultar lista";
}

function mostrarListado() {
    var listado = document.getElementById("listado");
    listado.classList.add("visible");
    listado.classList.remove("colapsado");
    document.getElementById("toggleTexto").textContent = "Ocultar lista";
}

// ════════════════════════════════════════════════════════
//  PARSEO CSV — se activa cuando se conecte la URL real
//  (no se usa con los datos de prueba)
// ════════════════════════════════════════════════════════
function parsearCSV(texto) {
    var lineas = texto.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
    if (lineas.length < 2) return [];
    var cab = lineas[0];
    var sep = cab.split(";").length > cab.split(",").length ? ";" : ",";
    var cabecera = splitCSV(cab, sep).map(function(c){ return c.replace(/^\uFEFF/,"").toLowerCase().trim(); });
    function ci(re){ return cabecera.findIndex(function(c){ return new RegExp(re,"i").test(c); }); }
    var iLat=ci("latitud"), iLng=ci("longitud"), iNom=ci("r.tulo|rotulo|nombre"), iDir=ci("direcci");
    var iMun=ci("municipio"), iHor=ci("horario"), iMar=ci("margen");
    var iG95=ci("gasolina.95|g_95|precio.*95"), iG98=ci("gasolina.98|g_98|precio.*98");
    var iGOA=ci("gas.leo.?a|gasoleo.?a|g_a\\b|goa\\b"), iGLP=ci("glp|gas.licuado");
    var res = [];
    for (var i=1;i<lineas.length;i++) {
        var l=lineas[i].trim(); if(!l) continue;
        var c=splitCSV(l,sep);
        var lat=parseFloat((c[iLat]||"").replace(",",".")), lng=parseFloat((c[iLng]||"").replace(",","."));
        if(isNaN(lat)||isNaN(lng)||lat<27||lat>44||lng<-19||lng>5) continue;
        var mar=iMar>=0?(c[iMar]||"").toUpperCase().trim():"A"; if(!mar||mar==="N") mar="A";
        res.push({ lat:lat, lng:lng,
            nombre:(iNom>=0?c[iNom]:"Gasolinera").trim()||"Gasolinera",
            dir:(iDir>=0?c[iDir]:"").trim(), muni:(iMun>=0?c[iMun]:"").trim(),
            horario:(iHor>=0?c[iHor]:"").trim(), margen:mar,
            g95:pxv(iG95>=0?c[iG95]:""), g98:pxv(iG98>=0?c[iG98]:""),
            goa:pxv(iGOA>=0?c[iGOA]:""), glp:pxv(iGLP>=0?c[iGLP]:"") });
    }
    return res;
}
function splitCSV(l,sep){ var c=[],a="",q=false; for(var i=0;i<l.length;i++){ var x=l[i]; if(x==='"'){ if(q&&l[i+1]==='"'){a+='"';i++;}else q=!q; }else if(x===sep&&!q){c.push(a);a="";}else a+=x; } c.push(a); return c; }
function pxv(v){ if(v===""||v===null||v===undefined) return null; var n=parseFloat(String(v).replace(",",".")); return isNaN(n)||n<=0?null:n; }


// ════════════════════════════════════════════════════════
//  CALCULAR RUTA (OSRM)
// ════════════════════════════════════════════════════════
function calcularRuta() {
    if (!coordOrigen)  { msg("Selecciona el origen de la lista", "error"); return; }
    if (!coordDestino) { msg("Selecciona el destino de la lista", "error"); return; }

    var btn = document.getElementById("btnCalcular");
    btn.disabled = true; btn.textContent = "…";
    msg("Calculando ruta…", "info");

    if (routingControl) { mapa.removeControl(routingControl); routingControl = null; }

    routingControl = L.Routing.control({
        waypoints: [
            L.latLng(coordOrigen.lat,  coordOrigen.lng),
            L.latLng(coordDestino.lat, coordDestino.lng)
        ],
        routeWhileDragging: false, addWaypoints: false,
        draggableWaypoints: false, fitSelectedRoutes: true, show: false,
        lineOptions: { styles: [{ color: "#1976D2", weight: 5, opacity: 0.85 }] },
        router: L.Routing.osrmv1({
            serviceUrl: "https://router.project-osrm.org/route/v1",
            profile:    "driving"
        }),
        createMarker: function(i, wp) {
            return L.marker(wp.latLng, { icon: L.divIcon({
                className: "",
                html: svgLetra(i === 0 ? "#1976D2" : "#7B1FA2", i === 0 ? "A" : "B"),
                iconSize: [28,36], iconAnchor: [14,36]
            })});
        }
    }).addTo(mapa);

    routingControl.on("routesfound", function(e) {
        btn.disabled = false; btn.textContent = "Calcular ruta";
        var ruta = e.routes[0];
        var dist = (ruta.summary.totalDistance / 1000).toFixed(1) + " km";
        var dur  = Math.round(ruta.summary.totalTime / 60) + " min";
        msg("✓ " + dist + " · " + dur, "ok");

        routePolyline = ruta.coordinates.map(function(c){ return { lat: c.lat, lng: c.lng }; });

        if (gasolinerasDB.length) {
            calcularRangoPrecio();
            filtrarYMostrar();
            mostrarListado();
        } else {
            msg("✓ " + dist + " · " + dur + " — cargando datos de gasolineras…", "ok");
        }

        colapsarPanel();   // en móvil: ganar espacio visual
    });

    routingControl.on("routingerror", function(e) {
        btn.disabled = false; btn.textContent = "Calcular ruta";
        msg("Error: " + (e.error && e.error.message ? e.error.message : "sin conexión"), "error");
    });
}

function svgLetra(color, letra) {
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 36" width="28" height="36">' +
        '<path fill="' + color + '" d="M14 0C6.27 0 0 6.27 0 14c0 5.25 3.02 9.8 7.44 12.12L14 36l6.56-10.88C24.98 23.8 28 19.25 28 14 28 6.27 21.73 0 14 0z"/>' +
        '<circle fill="white" cx="14" cy="14" r="8"/>' +
        '<text x="14" y="18" text-anchor="middle" font-size="9" font-family="Arial" font-weight="bold" fill="' + color + '">' + letra + '</text>' +
        '</svg>';
}


// ════════════════════════════════════════════════════════
//  GRADIENTE VERDE → AMARILLO → ROJO
// ════════════════════════════════════════════════════════
function calcularRangoPrecio() {
    var comb = document.getElementById("filtroComb").value;
    precioMin = Infinity; precioMax = -Infinity;
    gasolinerasDB.forEach(function(g) {
        var p = getPrecio(g, comb);
        if (p !== null) { if (p < precioMin) precioMin = p; if (p > precioMax) precioMax = p; }
    });
}

function precioAColor(p) {
    if (p === null || precioMin >= precioMax) return "#1976D2";
    var t = Math.max(0, Math.min(1, (p - precioMin) / (precioMax - precioMin)));
    var r, g, b;
    if (t < 0.5) {
        var tt = t * 2;
        r = Math.round(34  + tt * (234 - 34));
        g = Math.round(197 + tt * (179 - 197));
        b = Math.round(94  + tt * (8   - 94));
    } else {
        var tt = (t - 0.5) * 2;
        r = Math.round(234 + tt * (220 - 234));
        g = Math.round(179 + tt * (38  - 179));
        b = Math.round(8   + tt * (38  - 8));
    }
    return "rgb(" + r + "," + g + "," + b + ")";
}

function getPrecio(gas, comb) {
    if (comb === "todos") {
        var ps = [gas.g95, gas.g98, gas.goa, gas.glp].filter(function(p){ return p !== null; });
        return ps.length ? Math.min.apply(null, ps) : null;
    }
    return gas[comb] !== undefined ? gas[comb] : null;
}

function precioOrden(gas) {
    var p = getPrecio(gas, document.getElementById("filtroComb").value);
    return p !== null ? p : Infinity;
}


// ════════════════════════════════════════════════════════
//  GEOMETRÍA
// ════════════════════════════════════════════════════════
function haversine(a, b) {
    var R = 6371000, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
    var h = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    return 2*R*Math.asin(Math.sqrt(h));
}

function proyectar(P, A, B) {
    var cosL = Math.cos(A.lat*Math.PI/180);
    var bx = (B.lng-A.lng)*cosL*111320, by = (B.lat-A.lat)*111320;
    var px = (P.lng-A.lng)*cosL*111320, py = (P.lat-A.lat)*111320;
    var ab2 = bx*bx+by*by, t = ab2>0 ? Math.max(0, Math.min(1, (px*bx+py*by)/ab2)) : 0;
    var dx = px-t*bx, dy = py-t*by;
    return { dist: Math.sqrt(dx*dx+dy*dy), t: t, lado: bx*py-by*px > 0 ? "I" : "D" };
}

function gasVsRuta(gas, poly) {
    var minD=Infinity, minL="D", minI=0, minT=0;
    for (var i = 0; i < poly.length-1; i++) {
        var r = proyectar(gas, poly[i], poly[i+1]);
        if (r.dist < minD) { minD=r.dist; minL=r.lado; minI=i; minT=r.t; }
    }
    var km = 0;
    for (var j = 0; j < minI; j++) km += haversine(poly[j], poly[j+1]);
    km += minT * haversine(poly[minI], poly[minI+1]);
    return { distM: Math.round(minD), lado: minL, km: km/1000 };
}


// ════════════════════════════════════════════════════════
//  FILTRAR → ORDENAR → MOSTRAR
// ════════════════════════════════════════════════════════
function ordenar(lista) {
    var cr = document.getElementById("ordenar").value;
    lista.sort(function(a, b) {
        switch(cr) {
            case "precio_asc":  return precioOrden(a.gas) - precioOrden(b.gas);
            case "precio_desc": return precioOrden(b.gas) - precioOrden(a.gas);
            case "km_asc":      return a.km    - b.km;
            case "dist_asc":    return a.distM - b.distM;
            default: return 0;
        }
    });
    return lista;
}

function filtrarYMostrar() {
    var umbral = parseInt(document.getElementById("umbral").value) * 1000; // km → metros
    var flado  = document.getElementById("filtroLado").value;
    var comb   = document.getElementById("filtroComb").value;

    var enc = gasolinerasDB.reduce(function(acc, gas) {
        var r = gasVsRuta(gas, routePolyline);
        if (r.distM > umbral) return acc;
        if (flado !== "todos") {
            var marOk = gas.margen === "A" || gas.margen === flado;
            var ladOk = r.lado === flado;
            if (!marOk && !ladOk) return acc;
        }
        if (comb !== "todos" && !gas[comb]) return acc;
        acc.push({ gas: gas, distM: r.distM, lado: r.lado, km: r.km });
        return acc;
    }, []);

    resultadosActuales = enc;
    mostrarResultados(ordenar(enc.slice()));
}

              'd="M17 0C7.61 0 0 7.61 0 17c0 6.56 3.7 12.27 9.15 15.24L17 44l7.85-11.76C30.3 29.27 34 23.56 34 17 34 7.61 26.39 0 17 0z"/>' +
        '<circle fill="white" cx="17" cy="17" r="11"/>' +
        '<text x="17" y="14" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="' + color + '" font-weight="bold">⛽</text>' +
        (pStr ? '<text x="17" y="22" text-anchor="middle" font-size="6.5" font-family="Arial,sans-serif" fill="' + color + '" font-weight="bold">' + pStr + '</text>' : '') +
        '</svg>';
    return L.divIcon({ className:"", html:svg, iconSize:[34,44], iconAnchor:[17,44], popupAnchor:[0,-44] });
}

function mostrarResultados(lista) {
    markersEnRuta.forEach(function(m){ mapa.removeLayer(m); });
    markersEnRuta = [];

    var n = lista.length;
    document.getElementById("countLabel").textContent =
        n ? "(" + n + " gasolinera" + (n !== 1 ? "s" : "") + ")" : "";

    var container = document.getElementById("gasList");
    container.innerHTML = "";

    if (!lista.length) {
        container.innerHTML = '<div class="empty-msg">Sin gasolineras con estos filtros.<br>Prueba a ampliar el radio ☝️</div>';
        return;
    }

    var comb = document.getElementById("filtroComb").value;

    lista.forEach(function(item, idx) {
        var gas   = item.gas;
        var p     = getPrecio(gas, comb);
        var color = precioAColor(p);
        var pStr  = p !== null ? p.toFixed(2) : null;

        var marker = L.marker([gas.lat, gas.lng], {
            icon: iconoGasolinera(color, pStr),
            title: gas.nombre,
            zIndexOffset: 500 - idx
        }).addTo(mapa);

        var filas = [["G95",gas.g95],["G98",gas.g98],["GOA",gas.goa],["GLP",gas.glp]];
        var tabla = filas.filter(function(f){ return f[1]; }).map(function(f){
            var c = precioAColor(f[1]);
            return '<tr><td style="color:#555;padding-right:12px">' + f[0] + '</td>' +
                   '<td style="font-weight:700;text-align:right;color:'+c+'">' + f[1].toFixed(3) + ' €/l</td></tr>';
        }).join("");

        marker.bindPopup(
            '<div style="min-width:180px;font-family:sans-serif;font-size:13px">' +
            '<strong style="font-size:14px">' + escH(gas.nombre) + '</strong><br>' +
            '<span style="color:#666;font-size:11px">' + escH(gas.dir) + (gas.muni ? " · " + escH(gas.muni) : "") + '</span>' +
            '<hr style="margin:6px 0;border:none;border-top:1px solid #eee">' +
            (tabla ? '<table style="border-collapse:collapse;width:100%;font-size:12px">' + tabla + '</table>'
                   : '<em style="color:#aaa">Sin precios</em>') +
            '<hr style="margin:6px 0;border:none;border-top:1px solid #eee">' +
            '<span style="font-size:11px;color:#555">📍 ' +
                (item.lado === "D" ? "Derecho" : "Izquierdo") +
                ' · km ' + item.km.toFixed(1) + ' · ' + item.distM + ' m</span>' +
            (gas.horario ? '<br><span style="font-size:10px;color:#999">🕐 ' + escH(gas.horario) + '</span>' : "") +
            '<br><br><a href="https://www.google.com/maps/dir/?api=1&destination=' + gas.lat + ',' + gas.lng + '" ' +
                'target="_blank" style="color:#1976D2;font-size:12px">🗺 Cómo llegar</a>' +
            '</div>'
        , { maxWidth: 240 });

        marker.on("click", function(){ resaltarItem(idx); });
        markersEnRuta.push(marker);
        gas._marker = marker;

        var ladoClass = "b-lado-" + (item.lado || "A");
        var ladoLabel = item.lado === "D" ? "🟢 Dcho" : item.lado === "I" ? "🔴 Izdo" : "🔵 Ambos";

        var precioBadge = "";
        if (p !== null) {
            var bg = color.replace("rgb(","rgba(").replace(")",", 0.12)");
            var bo = color.replace("rgb(","rgba(").replace(")",", 0.4)");
            precioBadge = '<span class="badge" style="background:'+bg+';color:'+color+';border:1px solid '+bo+';font-size:11px">' +
                          p.toFixed(3) + ' €</span>';
        }

        var div = document.createElement("div");
        div.className = "gas-item"; div.id = "item-" + idx;
        div.innerHTML =
            '<div class="gas-rank" style="background:' + color + '">' + (idx+1) + '</div>' +
            '<div class="gas-body">' +
                '<div class="gas-nombre">' + escH(gas.nombre) + '</div>' +
                '<div class="gas-dir">' + escH(gas.dir) + (gas.muni ? " · " + escH(gas.muni) : "") + '</div>' +
                '<div class="gas-meta">' +
                    precioBadge +
                    '<span class="badge ' + ladoClass + '">' + ladoLabel + '</span>' +
                    '<span class="badge b-km">km ' + item.km.toFixed(1) + '</span>' +
                    '<span class="badge b-dist">' + item.distM + 'm</span>' +
                '</div>' +
            '</div>';

        div.addEventListener("click", function(){
            resaltarItem(idx);
            mapa.setView([gas.lat, gas.lng], 16);
            gas._marker.openPopup();
        });

        container.appendChild(div);
    });
}

function resaltarItem(idx) {
    document.querySelectorAll(".gas-item").forEach(function(el){ el.classList.remove("active"); });
    var el = document.getElementById("item-" + idx);
    if (el) { el.classList.add("active"); el.scrollIntoView({ behavior: "smooth", block: "nearest" }); }
}

function iniciarNominatim(inputId, sugId, cb) {
    var input  = document.getElementById(inputId);
    var sugBox = document.getElementById(sugId);
    var timer  = null, resultados = [], focusIdx = -1;

    function buscar() {
        var q = input.value.trim();
        if (q.length < 3) { cerrar(); return; }
        var url = "https://nominatim.openstreetmap.org/search?" + new URLSearchParams({
            q: q, format: "json", limit: CONFIG.MAX_SUGERENCIAS,
            countrycodes: "es", addressdetails: 1, "accept-language": "es"
        });
        fetch(url, { headers: { "Accept-Language": "es" } })
            .then(function(r){ return r.json(); })
            .then(function(data) {
                if (!data.length) { cerrar(); return; }
                resultados = data; renderSugs();
            }).catch(function(){ cerrar(); });
    }

    function renderSugs() {
        sugBox.innerHTML = ""; focusIdx = -1;
        resultados.forEach(function(r, i) {
            var div = document.createElement("div");
            div.className = "sug-item";
            var main = r.name || r.display_name.split(",")[0];
            div.innerHTML = '<div class="sug-main">' + escH(main) + '</div>' +
                            '<div class="sug-sub">'  + escH(r.display_name) + '</div>';
            div.addEventListener("mousedown", function(e){ e.preventDefault(); seleccionar(i); });
            sugBox.appendChild(div);
        });
        sugBox.classList.add("open");
    }

    function seleccionar(i) {
        var r = resultados[i];
        input.value = r.display_name;
        cb({ lat: parseFloat(r.lat), lng: parseFloat(r.lon) });
        cerrar();
    }
    function cerrar() {
        sugBox.classList.remove("open"); sugBox.innerHTML = "";
        resultados = []; focusIdx = -1;
    }
    function actualizarFocus() {
        sugBox.querySelectorAll(".sug-item").forEach(function(el, i){
            el.classList.toggle("focused", i === focusIdx);
        });
    }
    input.addEventListener("input", function(){
        cb(null); clearTimeout(timer);
        timer = setTimeout(buscar, CONFIG.DEBOUNCE_MS);
    });
    input.addEventListener("keydown", function(e){
        if (e.key === "Enter")     { e.preventDefault(); focusIdx >= 0 ? seleccionar(focusIdx) : (clearTimeout(timer), buscar()); return; }
        if (e.key === "ArrowDown") { focusIdx = Math.min(focusIdx+1, resultados.length-1); actualizarFocus(); e.preventDefault(); return; }
        if (e.key === "ArrowUp")   { focusIdx = Math.max(focusIdx-1, -1); actualizarFocus(); e.preventDefault(); return; }
        if (e.key === "Escape")    { cerrar(); }
    });
    input.addEventListener("blur", function(){ setTimeout(cerrar, 150); });
}

function escH(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }


// ════════════════════════════════════════════════════════
//  GEOLOCALIZACIÓN Y SEGUIMIENTO
// ════════════════════════════════════════════════════════
function usarMiUbicacion() {
    if (!navigator.geolocation) { msg("Geolocalización no disponible","error"); return; }
    var btn=document.getElementById("btnGeo"), inp=document.getElementById("origen");
    btn.classList.add("spin"); btn.textContent="↻";
    inp.value="Obteniendo ubicación…"; inp.disabled=true;
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            var lat=pos.coords.latitude, lng=pos.coords.longitude;
            coordOrigen = { lat:lat, lng:lng };
            fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&accept-language=es")
                .then(function(r){ return r.json(); })
                .then(function(d){
                    btn.classList.remove("spin"); btn.textContent="⊕"; inp.disabled=false;
                    inp.value = d.display_name || lat.toFixed(5)+", "+lng.toFixed(5);
                    msg("Precisión GPS: ±" + Math.round(pos.coords.accuracy) + " m", "info");
                })
                .catch(function(){
                    btn.classList.remove("spin"); btn.textContent="⊕"; inp.disabled=false;
                    inp.value = lat.toFixed(5)+", "+lng.toFixed(5);
                });
        },
        function(err) {
            btn.classList.remove("spin"); btn.textContent="⊕";
            inp.disabled=false; inp.value=""; coordOrigen=null;
            msg({1:"Permiso denegado",2:"Sin señal",3:"Tiempo agotado"}[err.code]||err.message,"error");
        },
        { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
}

function alternarSeguimiento() {
    var btn = document.getElementById("btnSeguimiento");
    if (!seguimientoActivo) {
        iniciarSeguimiento(); btn.textContent="⏹"; seguimientoActivo=true;
    } else {
        detenerSeguimiento(); btn.textContent="📍"; seguimientoActivo=false;
    }
}

function iniciarSeguimiento() {
    if (!navigator.geolocation) { msg("Geolocalización no disponible","error"); return; }
    watchId = navigator.geolocation.watchPosition(
        function(pos) {
            var loc=L.latLng(pos.coords.latitude, pos.coords.longitude), prec=pos.coords.accuracy;
            if (!marcadorUsuario) {
                var icon = L.divIcon({
                    className:"",
                    html:'<div style="width:16px;height:16px;border-radius:50%;background:#4285F4;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.3)"></div>',
                    iconSize:[16,16], iconAnchor:[8,8]
                });
                marcadorUsuario  = L.marker(loc, { icon:icon, zIndexOffset:999 }).addTo(mapa);
                circuloPrecision = L.circle(loc, { radius:prec, color:"#4285F4", weight:1, fillOpacity:.12 }).addTo(mapa);
                mapa.setView(loc, 15);
            } else {
                marcadorUsuario.setLatLng(loc);
                circuloPrecision.setLatLng(loc); circuloPrecision.setRadius(prec);
            }
            msg("📍 ±" + Math.round(prec) + " m", "info");
        },
        function(err) {
            msg("Error GPS: "+err.message,"error");
            detenerSeguimiento();
            document.getElementById("btnSeguimiento").textContent="📍";
            seguimientoActivo=false;
        },
        { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
}

function detenerSeguimiento() {
    if (watchId!=null)       { navigator.geolocation.clearWatch(watchId); watchId=null; }
    if (marcadorUsuario)     { mapa.removeLayer(marcadorUsuario);  marcadorUsuario=null; }
    if (circuloPrecision)    { mapa.removeLayer(circuloPrecision); circuloPrecision=null; }
}

function msg(txt, tipo) {
    var el = document.getElementById("msg");
    el.innerHTML = txt; el.className = "msg on " + tipo;
}

window.addEventListener("beforeunload", detenerSeguimiento);
</script>
